<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zenthic Growth Media | Digital Agency</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../../script.js"></script>
    <style>
        .image-placeholder { background-color: #f3f4f6; border: 2px dashed #d1d5db; display: flex; align-items: center; justify-content: center; text-align: center; padding: 1rem; color: #9ca3af; }
        .hero-gradient { background: linear-gradient(135deg, #ffffff 0%, #f0fdf4 100%); }
    </style>
</head>
<body class="bg-white text-gray-900 font-sans leading-relaxed">

    <nav class="sticky top-0 z-50 bg-white/80 backdrop-blur-md px-6 md:px-12 py-5 border-b border-gray-100">
        <div class="flex justify-between items-center">

            <!-- Logo -->
            <div class="text-xl font-black tracking-tighter text-green-700">
                <a href="../../index.html" class="flex items-center gap-2">
                    <img src="../../assets/zen_growth_green700.png" class="w-10 h-10">
                    <span>ZENTHIC<br>GROWTH MEDIA</span>
                </a>
            </div>

            <!-- Hamburger -->
            <button id="menu-btn" class="md:hidden flex flex-col gap-1">
                <span class="line w-6 h-0.5 bg-black transition-all"></span>
                <span class="line w-6 h-0.5 bg-black transition-all"></span>
                <span class="line w-6 h-0.5 bg-black transition-all"></span>
            </button>

            <!-- Desktop Menu -->
            <div class="hidden md:flex space-x-8 items-center">
                <a href="../index.html" class="hover:text-green-700">Home</a>
                <a href="../pages/about-us.html" class="hover:text-green-700">About</a>
                <a href="../index.html#services" class="hover:text-green-700">Services</a>
                <a href="../index.html#contact" class="bg-green-700 text-white px-5 py-2 rounded-full">Contact Us</a>
            </div>

        </div>

        <!-- Mobile Menu -->
        <div id="mobile-menu" class="max-h-0 overflow-hidden transition-all duration-500 ease-in-out md:hidden flex flex-col items-center gap-5 mt-4">
            <a href="../index.html">Home</a>
            <a href="../pages/about-us.html">About</a>
            <a href="../index.html#services">Services</a>
            <a href="../index.html#contact" class="bg-green-700 text-white px-5 py-2 rounded-full">Contact Us</a>
        </div>
        <script>
            const btn = document.getElementById("menu-btn");
            const menu = document.getElementById("mobile-menu");
            const lines = document.querySelectorAll(".line");

            let open = false;

            btn.addEventListener("click", () => {
            open = !open;

            // menu animation
            if (open) {
                menu.style.maxHeight = "300px";
            } else {
                menu.style.maxHeight = "0px";
            }

            // hamburger → X animation
            lines[0].classList.toggle("rotate-45");
            lines[0].classList.toggle("translate-y-1.5");

            lines[1].classList.toggle("opacity-0");

            lines[2].classList.toggle("-rotate-45");
            lines[2].classList.toggle("-translate-y-1.5");
            });
        </script>
    </nav>

    <div class="hero-gradient py-20 px-6 md:px-12 text-center">
        <h1 class="text-4xl md:text-5xl font-bold mb-4">Instagram Growth Services</h1>
        <p class="text-lg md:text-xl text-gray-700 mb-8">Boost your Instagram presence with our expert growth strategies.</p>
    </div>
    <div style="display:flex; justify-content:center;">
        <select class="border border-gray-300 rounded-md px-7 py-2 mb-6">
            <option value="all">Select Service</option>
            <option value="followers">Followers</option>
            <option value="likes">Likes</option>
            <option value="views">Views</option>
            <option value="comments">Comments</option>
            <option value="shares">Shares</option>
            <option value="repost">Reposts</option>
            <option value="story-views">Story Views</option>
        </select>

        <form class="ml-4">
            <input type="text" placeholder="Enter Instagram Handle" class="border border-gray-300 rounded-md px-4 py-2 mb-6">
        </form>

    </div>

    <div id="footer"></div>
</body>
</html>
